html, body { height: 100%; }

:root {
  --border: var(--vscode-panel-border, rgba(128, 128, 128, 0.22));
  --muted: var(--vscode-descriptionForeground);
  --accent: var(--vscode-textLink-foreground);
  --hover: var(--vscode-list-hoverBackground, rgba(128, 128, 128, 0.12));
  --active: var(--vscode-list-activeSelectionBackground, rgba(128, 128, 128, 0.2));
  --ok: var(--vscode-testing-iconPassed, #3fb950);
  --warn: var(--vscode-charts-yellow, #cca700);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--vscode-font-family);
  font-size: 13px;
  color: var(--vscode-foreground);
  background: var(--vscode-sideBar-background, var(--vscode-editor-background));
}
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* Brand header */
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 14px 14px;
}
.brand img { width: 30px; height: 30px; border-radius: 7px; }
.brand .names { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
.brand .kicker {
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 8.5px; text-transform: uppercase; letter-spacing: 0.26em; color: var(--muted);
}
.brand .word { font-weight: 700; font-size: 14px; letter-spacing: 0.01em; }

.rule { height: 1px; background: var(--border); margin: 0 14px; }

/* Nav */
nav { display: flex; flex-direction: column; padding: 10px 8px; gap: 2px; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 11px;
  width: 100%; text-align: left;
  padding: 9px 10px; border: none; border-radius: 8px;
  background: transparent; color: inherit; cursor: pointer;
  position: relative;
  font-family: inherit;
}
.nav-item:hover { background: var(--hover); }
.nav-item:focus-visible { outline: 1px solid var(--vscode-focusBorder); outline-offset: -1px; }
.nav-item.active { background: var(--active); }
.nav-item.active::before {
  content: ""; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 3px; border-radius: 3px; background: var(--accent);
}
.nav-item .ico { width: 18px; height: 18px; flex-shrink: 0; color: var(--muted); }
.nav-item.active .ico, .nav-item:hover .ico { color: var(--vscode-foreground); }
.nav-item .txt { min-width: 0; display: flex; flex-direction: column; }
.nav-item .label { font-weight: 600; font-size: 13px; }
.nav-item .desc {
  font-size: 11px; color: var(--muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.nav-item .chev { margin-left: auto; color: var(--muted); opacity: 0; transition: opacity 0.1s; }
.nav-item:hover .chev, .nav-item.active .chev { opacity: 0.7; }

.spacer-divider { margin: 8px 8px; height: 1px; background: var(--border); }

/* Status footer */
.footer {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 16px; border-top: 1px solid var(--border);
  font-size: 12px;
}
.dot { width: 8px; height: 8px; border-radius: 999px; background: var(--muted); flex-shrink: 0; }
.dot.off { background: var(--muted); }
.dot.menu { background: var(--warn); }
.dot.mission { background: var(--ok); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ok) 20%, transparent); }
.footer .flabel { color: var(--muted); }
.footer .ftime { margin-left: auto; font-family: var(--vscode-editor-font-family, monospace); font-size: 10.5px; color: var(--muted); }

body { background: var(--vscode-editor-background) !important; }
#app { width: 300px; min-height: 100vh; background: var(--vscode-sideBar-background, #252526); border-right: 1px solid var(--vscode-panel-border); }
#previewbar{position:fixed;top:0;right:0;left:301px;padding:8px 16px;font-size:12px;font-family:var(--vscode-font-family);color:var(--vscode-descriptionForeground)}
#toast{position:fixed;right:16px;bottom:16px;z-index:50;display:flex;flex-direction:column;gap:8px}
#toast .t{background:var(--vscode-editorWidget-background,#252526);border:1px solid var(--vscode-panel-border);border-left:3px solid var(--vscode-textLink-foreground);color:var(--vscode-foreground);font-family:var(--vscode-font-family);font-size:12px;padding:9px 12px;border-radius:6px}
</style>

    edit: `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"/></svg>`,
    layers: `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 9 5-9 5-9-5 9-5Z"/><path d="m3 12 9 5 9-5"/><path d="m3 17 9 5 9-5"/></svg>`,
    terminal: `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="m7 9 3 3-3 3M13 15h4"/></svg>`,
    shield: `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3Z"/></svg>`,
    gear: `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>`,
    chev: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`,
  };

  // In the requested order. Settings is separated to the bottom, website-style.
  const ITEMS = [
    { id: "browse", label: "Browse Mods", desc: "Discover & install community mods", command: "dcs.marketplace.open", icon: "store" },
    { id: "mymods", label: "My Mods", desc: "Enable, update & remove installed mods", command: "dcs.mymods.open", icon: "layers" },
    { id: "create", label: "Create a Mod", desc: "Author a dcs-studio.toml", command: "dcs.manifest.author", icon: "edit" },
    { id: "console", label: "DCS Console", desc: "Run Lua in the live sim", command: "dcs.bridge.console", icon: "terminal" },
    { id: "mission", label: "MissionScripting", desc: "Sanitization toggle", command: "dcs.mission.open", icon: "shield" },
    { id: "settings", label: "Settings", desc: "DCS paths & options", command: "dcs.setup.open", icon: "gear", footer: true },
  ];

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }

  function itemHtml(it) {
    return `
      <button class="nav-item" data-id="${it.id}" data-command="${it.command}" title="${esc(it.label)}">
        ${I[it.icon]}
        <span class="txt">
          <span class="label">${esc(it.label)}</span>
          <span class="desc">${esc(it.desc)}</span>
        </span>
        <span class="chev">${I.chev}</span>
      </button>`;
  }

  const main = ITEMS.filter((i) => !i.footer);
  const footer = ITEMS.filter((i) => i.footer);

  app.innerHTML = `
    <div class="brand">
      <img src="${window.__LOGO__}" alt="" />
      <span class="names">
        <span class="kicker">DCS&nbsp;Studio</span>
        <span class="word">DCS Studio</span>
      </span>
    </div>
    <div class="rule"></div>
    <nav>
      ${main.map(itemHtml).join("")}
      <div class="spacer-divider"></div>
      ${footer.map(itemHtml).join("")}
    </nav>
    <div class="footer">
      <span class="dot off" id="dot"></span>
      <span class="flabel" id="flabel">Bridge offline</span>
      <span class="ftime" id="ftime"></span>
    </div>
  `;

  let active = null;
  app.querySelectorAll(".nav-item").forEach((el) => {
    el.addEventListener("click", () => {
      if (active) active.classList.remove("active");
      el.classList.add("active");
      active = el;
      vscode.postMessage({ type: "run", command: el.dataset.command });
    });
  });

  const dot = document.getElementById("dot");
  const flabel = document.getElementById("flabel");
  const ftime = document.getElementById("ftime");
  window.addEventListener("message", (e) => {
    const m = e.data;
    if (!m || m.type !== "status") return;
    const s = m.status;
    if (!s.connected) {
      dot.className = "dot off";
      flabel.textContent = "Bridge offline";
      ftime.textContent = "";
    } else if (s.dcsTime && s.dcsTime > 0) {
      dot.className = "dot mission";
      flabel.textContent = "Mission running";
      ftime.textContent = "t " + s.dcsTime.toFixed(0) + "s";
    } else {
      dot.className = "dot menu";
      flabel.textContent = "At menu";
      ftime.textContent = "";
    }
  });
})();
</script>
