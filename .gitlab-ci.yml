# CI gates for dcs-studio (issue #7). Mirrors the local gates the MRs
# quote: engine + CLI Rust suites with pedantic clippy, svelte-check, the
# browser e2e suite, a wasm-bindings sync check, and the Tauri app crate
# (compile + unit/integration suites, incl. the host<->real-server IPC
# seam) in the `app` job.

stages:
  - test

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

.rust-cache: &rust-cache
  key: rust-$CI_COMMIT_REF_SLUG
  paths:
    - .cargo/registry
    - target
  policy: pull-push

rust:
  stage: test
  image: rust:1.92
  cache: *rust-cache
  script:
    - rustup component add clippy
    - cargo test -p dcs-lua-syntax -p dcs-lua-fmt -p dcs-lua-lsp-core -p dcs-lua-ide -p dcs-studio-project -p dcs-studio-cli
    - cargo clippy -p dcs-lua-syntax -p dcs-lua-fmt -p dcs-lua-lsp-core -p dcs-lua-ide -p dcs-studio-project -p dcs-studio-cli --all-targets -- -D warnings

# App-compile + host<->real-server gate: builds the Tauri crate against
# the webkit2gtk stack and runs its suites, including tests/host_ipc.rs —
# the host's framing pump driven against a real `dcs-studio-cli lsp`
# (built first; DCS_STUDIO_CLI pins the path so the test cannot skip).
# Webview-layer e2e stays /lab-based (decisions/005); tauri-driver judged
# unnecessary for now.
app:
  stage: test
  image: rust:1.92
  # Own cache key: the app job's tauri/webkit artifacts would churn the
  # shared rust cache the engine/CLI job depends on.
  cache:
    key: rust-app-$CI_COMMIT_REF_SLUG
    paths:
      - .cargo/registry
      - target
    policy: pull-push
  variables:
    DCS_STUDIO_CLI: $CI_PROJECT_DIR/target/debug/dcs-studio-cli
  script:
    - apt-get update -qq
    - apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev pkg-config
    - mkdir -p build # tauri codegen requires the frontendDist dir to exist
    - cargo build -p dcs-studio-cli
    - cargo test -p dcs-studio --lib --tests
    - rustup component add clippy
    - cargo clippy -p dcs-studio --all-targets -- -D warnings

# issue #22: prove scaffolded templates compile, not just string-assert.
# The rust-dll probe is the opt-in template_compile integration test
# (DCS_TEMPLATE_COMPILE=1; same env runs it locally): scaffold into a temp
# dir, then `cargo check` it — type-level proof only. `cargo check` never
# links, so DCS's Windows-only lua import library is not needed here; a
# full `cargo build` would have to link a real liblua and stays out of
# scope. The lua-script probe goes through the real CLI: init, then
# `check` (exit code = error-finding count; a nonexistent root is an
# error, not a clean workspace) must come back clean. The `test -f`
# between them asserts init emitted the entry script where the template
# says, so the clean check is proven to have analysed real files.
template-compile:
  stage: test
  image: rust:1.92
  # Own cache key, registry only: the probe scaffolds into a fresh temp
  # path every run, so its target dir is uncacheable by construction.
  cache:
    key: rust-template-$CI_COMMIT_REF_SLUG
    paths:
      - .cargo/registry
    policy: pull-push
  variables:
    DCS_TEMPLATE_COMPILE: "1"
  script:
    - cargo test -p dcs-studio-project --test template_compile
    - cargo run -p dcs-studio-cli -- init "Lua Probe" --template lua-script --parent /tmp/probe
    # slugify("Lua Probe") = "lua-probe" (templates.rs); a moved entry
    # script would otherwise leave the check below with nothing to analyse.
    - test -f "/tmp/probe/Lua Probe/Scripts/lua-probe/main.lua"
    - cargo run -p dcs-studio-cli -- check "/tmp/probe/Lua Probe"

web:
  stage: test
  image: node:22
  script:
    - npm i -g pnpm@9
    - pnpm install --frozen-lockfile
    - pnpm check

e2e:
  stage: test
  image: node:22
  script:
    - npm i -g pnpm@9
    - pnpm install --frozen-lockfile
    - pnpm exec playwright install --with-deps chromium
    - pnpm test:lang
  artifacts:
    when: on_failure
    paths:
      - playwright-report
    expire_in: 7 days

# The committed wasm bindings must match the crates that claim to produce
# them. The .wasm binary itself is excluded (wasm-opt versions vary); the
# generated .js/.d.ts contract is the drift that bites.
wasm-sync:
  stage: test
  image: rust:1.92
  cache: *rust-cache
  script:
    - rustup target add wasm32-unknown-unknown
    - curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
    - wasm-pack build crates/dcs-lua-ide --release --target web --out-dir ../../src/lib/dcs-lua-wasm
    - git diff --exit-code -- src/lib/dcs-lua-wasm/dcs_lua_ide.js src/lib/dcs-lua-wasm/dcs_lua_ide.d.ts
