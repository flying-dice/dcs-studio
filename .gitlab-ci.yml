# CI gates for dcs-studio (issue #7). Mirrors the local gates the MRs
# quote: engine + CLI Rust suites with pedantic clippy, svelte-check, and
# the Tauri app crate (compile + unit/integration suites, incl. the
# host<->real-server IPC seam) in the `app` job.
#
# The language e2e suite (`pnpm test:lang`) is NOT gated here: issue #32
# moved it to drive the REAL app over WebView2 CDP (the only transport that
# works against Tauri's webview on Windows), so it is Windows-only and these
# Linux runners cannot host it. It runs locally / on a Windows runner. The
# wasm bindings and their sync check are gone with the in-page engine.

stages:
  - test

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

.rust-cache: &rust-cache
  key: rust-$CI_COMMIT_REF_SLUG
  paths:
    - .cargo/registry
    - target
  policy: pull-push

rust:
  stage: test
  image: rust:1.92
  cache: *rust-cache
  script:
    - rustup component add clippy
    # PUC validity gates (issue #27): the formatter's semantic guard
    # re-parses with our own tolerant parser, so the tolerant-accepts /
    # PUC-rejects divergence class is only caught by a real `luac -p`.
    # Debian's lua5.1 package is PUC Lua 5.1.5; with DCS_PUC_LUAC set the
    # goldens + formatted-corpus luac gates in dcs-lua-fmt always run here
    # (they skip hermetically when the env var is absent).
    - apt-get update -qq
    - apt-get install -y -qq lua5.1
    - export DCS_PUC_LUAC=$(command -v luac5.1)
    - cargo test -p dcs-lua-syntax -p dcs-lua-fmt -p dcs-lua-lsp-core -p dcs-lua-ide -p dcs-studio-project -p studio-mcp -p lua-analyzer -p studio-services -p studio-packages -p mock-package-server
    - cargo clippy -p dcs-lua-syntax -p dcs-lua-fmt -p dcs-lua-lsp-core -p dcs-lua-ide -p dcs-studio-project -p studio-mcp -p lua-analyzer -p studio-services -p studio-packages -p mock-package-server --all-targets -- -D warnings

# App-compile + host<->real-server gate: builds the Tauri crate against
# the webkit2gtk stack and runs its suites, including tests/host_ipc.rs —
# the host's framing pump driven against a real `lua-analyzer` process
# (built first; DCS_LUA_ANALYZER pins the path so the test cannot skip).
# Webview-layer e2e now drives the real app over CDP (decisions/005,
# revised by issue #32) — Windows-only, so it runs outside this Linux CI.
app:
  stage: test
  image: rust:1.92
  # Own cache key: the app job's tauri/webkit artifacts would churn the
  # shared rust cache the engine/CLI job depends on.
  cache:
    key: rust-app-$CI_COMMIT_REF_SLUG
    paths:
      - .cargo/registry
      - target
    policy: pull-push
  variables:
    DCS_LUA_ANALYZER: $CI_PROJECT_DIR/target/debug/lua-analyzer
  script:
    - apt-get update -qq
    - apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev pkg-config
    - mkdir -p build # tauri codegen requires the frontendDist dir to exist
    # tauri-build validates `externalBin` (tauri.conf.json) during the app
    # crate's build script: the sidecars must exist under their triple-suffixed
    # name or `cargo test`/`clippy` of the app fails before compiling. Build
    # both and stage them — debug is enough, the build script only checks they
    # exist (it does not run them).
    - cargo build -p lua-analyzer
    - 'TRIPLE=$(rustc -vV | sed -n "s/^host: //p")'
    - mkdir -p crates/app/binaries
    - cp target/debug/lua-analyzer "crates/app/binaries/lua-analyzer-$TRIPLE"
    - cargo test -p dcs-studio --lib --tests
    - rustup component add clippy
    - cargo clippy -p dcs-studio --all-targets -- -D warnings

# issue #22: prove scaffolded templates compile, not just string-assert.
# The rust-dll probe is the opt-in template_compile integration test
# (DCS_TEMPLATE_COMPILE=1; same env runs it locally): scaffold into a temp
# dir, then `cargo check` it — type-level proof only. `cargo check` never
# links, so DCS's Windows-only lua import library is not needed here; a
# full `cargo build` would have to link a real liblua and stays out of
# scope.
template-compile:
  stage: test
  image: rust:1.92
  # Own cache key, registry only: the probe scaffolds into a fresh temp
  # path every run, so its target dir is uncacheable by construction.
  cache:
    key: rust-template-$CI_COMMIT_REF_SLUG
    paths:
      - .cargo/registry
    policy: pull-push
  variables:
    DCS_TEMPLATE_COMPILE: "1"
  script:
    - cargo test -p dcs-studio-project --test template_compile

web:
  stage: test
  image: node:22
  script:
    - npm i -g pnpm@9
    - pnpm install --frozen-lockfile
    - pnpm check

# NOTE: there is no `e2e` job here any more. The language e2e suite
# (`pnpm test:lang`, e2e-lang/) was retargeted by issue #32 to drive the
# real packaged app over WebView2 CDP — Windows-only — so it cannot run on
# these Linux runners. Run it locally or on a Windows runner. The old
# browser-wasm `e2e` job and the `wasm-sync` bindings check were removed
# with the in-page wasm engine. Re-gating it (a Windows runner) is tracked
# in issue #35 — until then the language-frontend wiring is CI-ungated.
