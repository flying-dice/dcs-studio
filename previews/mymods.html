<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DCS Studio preview — My Mods</title>
<!-- Load order is load-bearing: harness -> fixture -> CSS -> mounts -> real
     media/mymods.js. media/mymods.js posts {type:"refresh"} synchronously at
     the bottom of its IIFE, so the fixture's onPost handler (registered above)
     must already be listening before that script tag runs. -->
<script src="harness.js"></script>
<script src="fixtures/mymods.js"></script>
<link rel="stylesheet" href="theme.css" />
<link rel="stylesheet" href="../media/base.css" />
<link rel="stylesheet" href="../media/mymods.css" />
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script src="../media/shared.js"></script>
<script src="../media/mymods.js"></script>
</body>
</html>
