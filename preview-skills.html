<!-- Dev preview for the Agent Skills panel (media/skills.js + skills.css).
     Open from the repo root: stubs acquireVsCodeApi and posts fake skill
     states so every card variant renders. Not shipped (.vscodeignore). -->
<style>
:root, :root[data-theme="light"] {
  --vscode-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Segoe UI Variable", system-ui, sans-serif;
  --vscode-editor-font-family: "Cascadia Code", Consolas, "Courier New", monospace;
  --vscode-editor-background: #ffffff;
  --vscode-foreground: #3b3b3b;
  --vscode-editorWidget-background: #f8f8f8;
  --vscode-panel-border: #e5e5e5;
  --vscode-descriptionForeground: #767676;
  --vscode-textLink-foreground: #005fb8;
  --vscode-focusBorder: #005fb8;
  --vscode-button-background: #005fb8;
  --vscode-button-foreground: #ffffff;
  --vscode-button-hoverBackground: #0258a8;
  --vscode-button-secondaryBackground: #e9e9e9;
  --vscode-button-secondaryForeground: #3b3b3b;
  --vscode-button-secondaryHoverBackground: #d8d8d8;
  --vscode-testing-iconPassed: #3d8c40;
  --vscode-charts-yellow: #bf8803;
  --vscode-charts-blue: #005fb8;
  --vscode-textCodeBlock-background: rgba(0,0,0,0.05);
}
@media (prefers-color-scheme: dark) {
  :root {
    --vscode-editor-background: #1f1f1f;
    --vscode-foreground: #cccccc;
    --vscode-editorWidget-background: #252526;
    --vscode-panel-border: #2b2b2b;
    --vscode-descriptionForeground: #9d9d9d;
    --vscode-textLink-foreground: #4daafc;
    --vscode-focusBorder: #0078d4;
    --vscode-button-background: #0078d4;
    --vscode-button-foreground: #ffffff;
    --vscode-button-hoverBackground: #026ec1;
    --vscode-button-secondaryBackground: #313131;
    --vscode-button-secondaryForeground: #cccccc;
    --vscode-button-secondaryHoverBackground: #3c3c3c;
    --vscode-testing-iconPassed: #73c991;
    --vscode-charts-yellow: #cca700;
    --vscode-charts-blue: #4daafc;
    --vscode-textCodeBlock-background: rgba(255,255,255,0.06);
  }
}
#toast{position:fixed;right:16px;bottom:16px;z-index:50;display:flex;flex-direction:column;gap:8px}
#toast .t{background:var(--vscode-editorWidget-background,#252526);border:1px solid var(--vscode-panel-border);border-left:3px solid var(--vscode-textLink-foreground);color:var(--vscode-foreground);font-family:var(--vscode-font-family);font-size:12px;padding:9px 12px;border-radius:6px}
</style>
<link href="media/skills.css" rel="stylesheet" />

<div id="app"></div>
<div id="toast"></div>
<script>
window.acquireVsCodeApi = function () {
  return {
    getState: () => ({}), setState: () => {},
    postMessage: (m) => {
      if (m && m.type === "refresh") return; // initial ask — state below stands in
      toast("→ posts <b>" + m.type + "</b> for skill <b>" + (m.id || "?") + "</b>");
    },
  };
};
function toast(html){ const w=document.getElementById("toast"); const e=document.createElement("div"); e.className="t"; e.innerHTML=html; w.appendChild(e); setTimeout(()=>e.remove(),2600); }

// One card per status so every variant is visible at once.
const STATE = {
  type: "skills",
  installDir: ".claude/skills",
  hasWorkspace: true,
  skills: [
    { id: "dcs-studio", name: "dcs-studio", description: "How to build, run, debug and publish DCS World mods in a DCS Studio project — manifest format, install roots, mission vs GUI scripting environments, the live bridge console, the Lua debugger, and the publish flow.", bundledVersion: "1.0.0", status: "not-installed" },
    { id: "dcs-studio-2", name: "dcs-studio (outdated)", description: "Same skill shown with an older installed copy — the update path.", bundledVersion: "1.2.0", installedVersion: "1.0.0", status: "outdated" },
    { id: "dcs-studio-3", name: "dcs-studio (current)", description: "Installed and matching the bundled version.", bundledVersion: "1.0.0", installedVersion: "1.0.0", status: "up-to-date" },
    { id: "dcs-studio-4", name: "dcs-studio (edited)", description: "Installed at the same version but with local edits.", bundledVersion: "1.0.0", installedVersion: "1.0.0", status: "modified" },
  ],
};
</script>
<script src="media/skills.js"></script>
<script>window.dispatchEvent(new MessageEvent("message", { data: STATE }));</script>
