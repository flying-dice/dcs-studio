html, body { height: 100%; }

:root {
  --brand: color-mix(in srgb, var(--vscode-textLink-foreground) 90%, transparent);
  --card: var(--vscode-editorWidget-background, var(--vscode-editor-background));
  --border: var(--vscode-panel-border, rgba(128, 128, 128, 0.25));
  --muted: var(--vscode-descriptionForeground);
  --radius: 10px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  font-family: var(--vscode-font-family);
  font-size: 13px;
  color: var(--vscode-foreground);
  background: var(--vscode-editor-background);
}

button {
  font-family: inherit;
  cursor: pointer;
}

.mono {
  font-family: var(--vscode-editor-font-family, monospace);
}

/* ── Top bar ── */
header {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--vscode-editor-background);
}

.brand-kicker {
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  color: var(--muted);
}

.brand-title {
  font-weight: 600;
}

.spacer {
  margin-left: auto;
}

.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--vscode-foreground);
}
.icon-btn:hover {
  background: var(--vscode-toolbar-hoverBackground, rgba(128, 128, 128, 0.15));
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 49px;
  z-index: 4;
  background: var(--vscode-editor-background);
}

.search {
  position: relative;
  flex: 1;
  min-width: 180px;
}
.search input {
  width: 100%;
  padding: 6px 10px 6px 30px;
  border-radius: 6px;
  border: 1px solid var(--vscode-input-border, var(--border));
  background: var(--vscode-input-background);
  color: var(--vscode-input-foreground);
  outline: none;
  font-size: 13px;
}
.search input:focus {
  border-color: var(--vscode-focusBorder);
}
.search .glass {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}

select {
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid var(--vscode-input-border, var(--border));
  background: var(--vscode-input-background);
  color: var(--vscode-input-foreground);
  font-size: 12px;
  outline: none;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid transparent;
  font-size: 12px;
  background: var(--vscode-button-background);
  color: var(--vscode-button-foreground);
}
.btn:hover {
  background: var(--vscode-button-hoverBackground);
}
.btn.secondary {
  background: var(--vscode-button-secondaryBackground, transparent);
  color: var(--vscode-button-secondaryForeground, var(--vscode-foreground));
  border-color: var(--border);
}
.btn.secondary:hover {
  background: var(--vscode-button-secondaryHoverBackground, var(--vscode-toolbar-hoverBackground));
}
.btn:disabled {
  opacity: 0.5;
  cursor: default;
}
.btn.block {
  width: 100%;
  justify-content: center;
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  padding: 16px;
}

.card {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card);
  padding: 12px;
  transition: border-color 0.12s ease;
}
.card:hover {
  border-color: color-mix(in srgb, var(--vscode-foreground) 30%, transparent);
}

.card-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  text-align: left;
  background: none;
  border: none;
  padding: 0;
  color: inherit;
  width: 100%;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  flex-shrink: 0;
  background: var(--vscode-editor-inactiveSelectionBackground, rgba(128, 128, 128, 0.2));
  object-fit: cover;
}
.avatar.lg {
  width: 48px;
  height: 48px;
  border-radius: 10px;
}

.card-title-row {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}
.card-title {
  font-weight: 600;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-author {
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 10px;
  color: var(--muted);
}
.stars {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 10px;
  color: var(--muted);
  margin-left: auto;
  white-space: nowrap;
}

.badge {
  border-radius: 4px;
  background: var(--vscode-badge-background);
  color: var(--vscode-badge-foreground);
  padding: 1px 6px;
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.blurb {
  margin-top: 8px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 10px;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  border: none;
  border-radius: 4px;
  background: var(--vscode-badge-background);
  color: var(--vscode-badge-foreground);
  padding: 2px 6px;
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.85;
}
.tag:hover {
  opacity: 1;
}

.card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.link {
  background: none;
  border: none;
  color: var(--vscode-textLink-foreground);
  font-size: 11px;
  padding: 0;
}
.link:hover {
  text-decoration: underline;
}
.link.muted {
  color: var(--muted);
}

.who {
  font-size: 11px;
  color: var(--muted);
}

.market-error {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  font-size: 12px;
  color: var(--vscode-editorWarning-foreground, #cca700);
  background: color-mix(in srgb, var(--vscode-editorWarning-foreground, #cca700) 10%, transparent);
  border-bottom: 1px solid var(--border);
}

/* ── Sign-in wall ── */
.wall {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  padding: 72px 24px;
  min-height: 50vh;
}
.wall-lock {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 52px;
  height: 52px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
}
.wall h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
}
.wall p {
  margin: 0;
  max-width: 30rem;
  font-size: 13px;
  line-height: 1.55;
  color: var(--muted);
}
.wall .btn {
  margin-top: 4px;
}

/* ── States ── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  text-align: center;
  color: var(--muted);
  padding: 80px 24px;
  font-size: 13px;
}
.spin {
  display: inline-block;
  animation: spin 0.9s linear infinite;
}
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* ── Product page ── */
.product {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px;
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 24px;
}
@media (max-width: 820px) {
  .product {
    grid-template-columns: 1fr;
  }
}

.product h1 {
  margin: 0;
  font-size: 20px;
}
.product-meta {
  display: flex;
  gap: 14px;
  align-items: center;
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}
.product-desc {
  color: var(--muted);
  margin-top: 12px;
}

.section-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--muted);
  margin: 22px 0 8px;
}

.aside-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card);
  padding: 12px;
}
.aside-card + .aside-card {
  margin-top: 14px;
}
.aside-card .section-label {
  margin-top: 0;
}

.note {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
}
.note.warn {
  color: var(--vscode-editorWarning-foreground, #cca700);
}
.note.ok {
  color: var(--vscode-testing-iconPassed, #3fb950);
}

.installed-row {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--vscode-testing-iconPassed, #3fb950);
  font-size: 12px;
}

.plan-item {
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 11px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.plan-item:last-child {
  border-bottom: none;
}
.plan-dest {
  color: var(--muted);
  display: flex;
  gap: 5px;
  align-items: center;
}

.kv {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  font-size: 11px;
  padding: 5px 0;
}
.kv .name {
  font-family: var(--vscode-editor-font-family, monospace);
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.progress {
  margin-top: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
}
.progress .bar {
  height: 4px;
  border-radius: 4px;
  background: var(--vscode-progressBar-background, rgba(128, 128, 128, 0.3));
  overflow: hidden;
  margin-top: 8px;
}
.progress .bar > span {
  display: block;
  height: 100%;
  background: var(--vscode-textLink-foreground);
  width: 0;
  transition: width 0.25s ease;
}

/* ── Markdown (README) ── */
.prose {
  font-size: 13px;
  line-height: 1.6;
}
.prose h1,
.prose h2,
.prose h3 {
  line-height: 1.3;
  margin: 20px 0 8px;
}
.prose h1 {
  font-size: 18px;
}
.prose h2 {
  font-size: 15px;
}
.prose h3 {
  font-size: 13px;
}
.prose p {
  margin: 8px 0;
}
.prose ul {
  margin: 8px 0;
  padding-left: 20px;
}
.prose li {
  margin: 3px 0;
}
.prose code {
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 12px;
  background: var(--vscode-textCodeBlock-background, rgba(128, 128, 128, 0.15));
  padding: 1px 5px;
  border-radius: 4px;
}
.prose pre {
  background: var(--vscode-textCodeBlock-background, rgba(128, 128, 128, 0.15));
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
}
.prose pre code {
  background: none;
  padding: 0;
}
.prose blockquote {
  margin: 10px 0;
  padding: 6px 12px;
  border-left: 3px solid var(--border);
  color: var(--muted);
}
.prose a {
  color: var(--vscode-textLink-foreground);
}

.codicon-inline {
  width: 14px;
  height: 14px;
  display: inline-block;
  vertical-align: -2px;
}

#previewbar{display:flex;align-items:center;gap:10px;padding:6px 14px;font-size:12px;font-family:var(--vscode-font-family);color:var(--vscode-descriptionForeground);background:var(--vscode-editorWidget-background);border-bottom:1px solid var(--vscode-panel-border)}
#previewbar b{color:var(--vscode-foreground);font-weight:600}
#toast{position:fixed;right:16px;bottom:16px;z-index:50;display:flex;flex-direction:column;gap:8px}
#toast .t{background:var(--vscode-editorWidget-background);border:1px solid var(--vscode-panel-border);border-left:3px solid var(--vscode-textLink-foreground);color:var(--vscode-foreground);font-family:var(--vscode-font-family);font-size:12px;padding:9px 12px;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
</style>

<script>
const D = window.__PREVIEW__;
function reply(msg, delay) { setTimeout(() => window.dispatchEvent(new MessageEvent("message", { data: msg })), delay || 0); }
function productFor(repo) {
  if (D.products[repo]) return D.products[repo];
  const l = D.listings.find((x) => x.repo === repo);
  return {
    repo: l.repo, name: l.name, author: l.author, description: l.description,
    repo_url: l.repo_url, avatar_url: l.avatar_url, stars: l.stars,
    readme: "# " + l.name + "\n\n" + l.description,
    release_tag: l.is_library ? null : "v1.0.0", release_url: l.repo_url + "/releases",
    assets: l.is_library ? [] : [{ name: l.name.replace(/\s+/g,"-").toLowerCase()+".zip", size: 6291456 }, { name: "dcs-studio.toml", size: 900 }],
    download_size: l.is_library ? 0 : 6292356,
    installable: !l.is_library, is_library: l.is_library,
    installs: [], dependencies: [], requires: [],
  };
}
window.acquireVsCodeApi = function () {
  let s = {};
  return {
    getState: () => s,
    setState: (v) => { s = v; },
    postMessage: (m) => {
      if (!m) return;
      if (m.type === "ready") return reply({ type: "auth", signedIn: false, browsing: false, topic: "dcs-studio" });
      if (m.type === "signIn") { reply({ type: "auth", signedIn: true, browsing: false, login: "you (preview)", topic: "dcs-studio" }); reply({ type: "listings:busy" }, 10); reply({ type: "listings", listings: D.listings }, 500); return; }
      if (m.type === "browseAnon") { reply({ type: "auth", signedIn: false, browsing: true, topic: "dcs-studio" }); reply({ type: "listings:busy" }, 10); reply({ type: "listings", listings: D.listings }, 500); return; }
      if (m.type === "discover") { reply({ type: "listings:busy" }); reply({ type: "listings", listings: D.listings }, 450); return; }
      if (m.type === "openProduct") { reply({ type: "product:busy", repo: m.repo }); reply({ type: "product", product: productFor(m.repo) }, 450); return; }
      if (m.type === "openExternal" && m.url) { toast("Opening " + m.url.replace(/^https?:\/\//, "") + " …"); try { window.open(m.url, "_blank"); } catch (e) {} return; }
      if (m.type === "install") return toast("Install for <b>" + (m.name||"this mod") + "</b> — the release install (plan preview) is the next step.");
    },
  };
};
function toast(html) {
  const wrap = document.getElementById("toast");
  const el = document.createElement("div");
  el.className = "t"; el.innerHTML = html;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3400);
}
</script>

  // ── Helpers ──
  function esc(s) {

  function fmtBytes(n) {

  }
  function initialsAvatar(name) {

    for (const line of lines) {

      if (h) { if (inList) { html += "</ul>"; inList = false; } html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; continue; }

        <button class="btn secondary" id="refresh" ${state.listBusy ? "disabled" : ""}>${state.listBusy ? `<span class="spin">${I.refresh}</span>` : I.refresh} Refresh</button>
      </div>
      ${state.listError ? `<div class="market-error">${I.warn} ${esc(state.listError)}</div>` : ""}
      <div id="gridwrap">${grid}</div>
    `;
    document.getElementById("q").addEventListener("input", (e) => {
      state.query = e.target.value;
      document.getElementById("gridwrap").innerHTML = gridHtml();
      bindCards();
    });
    document.getElementById("tag").addEventListener("change", (e) => { state.activeTag = e.target.value; renderList(); });
    document.getElementById("sort").addEventListener("change", (e) => { state.sort = e.target.value; renderList(); });
    document.getElementById("refresh").addEventListener("click", () => post({ type: "discover", force: true }));
    bindCards();
  }

  function shell(inner) {
    return `<header><span class="brand-kicker">DCS&nbsp;Studio</span><span class="brand-title">Marketplace</span></header>${inner}`;
  }

  function renderWall() {
    app.innerHTML = `
      <header><span class="brand-kicker">DCS&nbsp;Studio</span><span class="brand-title">Marketplace</span></header>
      <div class="wall">
        <div class="wall-lock">${I.lock}</div>
        <h2>Sign in to browse the Marketplace</h2>
        <p>Discovery searches GitHub for public repositories tagged <span class="mono">${esc(state.topic)}</span>. Signing in raises the rate limit and lets you install into your DCS folders.</p>
        <button class="btn" id="signin">${I.github} Sign in with GitHub</button>
        <button class="link" id="anon">Browse without signing in</button>
      </div>`;
    document.getElementById("signin").addEventListener("click", () => post({ type: "signIn" }));
    document.getElementById("anon").addEventListener("click", () => post({ type: "browseAnon" }));
  }

  function filtered() {
    const q = state.query.trim().toLowerCase();
    return state.listings
      .filter((m) => {
        if (state.activeTag && !m.labels.includes(state.activeTag)) return false;
        if (!q) return true;
        return (
          m.name.toLowerCase().includes(q) ||
          m.author.toLowerCase().includes(q) ||
          m.description.toLowerCase().includes(q) ||
          m.labels.some((l) => l.toLowerCase().includes(q))
        );
      })
      .sort((a, b) => (state.sort === "stars" ? b.stars - a.stars : a.name.localeCompare(b.name)));
  }

  function gridHtml() {
    if (state.listBusy && state.listings.length === 0)
      return `<div class="empty"><span class="spin">${I.refresh}</span> Searching GitHub…</div>`;
    const xs = filtered();
    if (xs.length === 0) {
      if (state.listings.length === 0)
        return `<div class="empty">No public repos are tagged <span class="mono">${esc(state.topic)}</span> yet. Publish one by adding the <span class="mono">${esc(state.topic)}</span> topic to a GitHub repo.</div>`;
      return `<div class="empty">No mods match your search.</div>`;
    }
    return `<div class="grid">${xs.map(card).join("")}</div>`;
  }

  function card(m) {
    return `
      <div class="card">
        <button class="card-head" data-open="${esc(m.repo)}">
          <img class="avatar" src="${esc(m.avatar_url)}" alt="" data-fallback="${esc(m.name)}" />
          <span style="min-width:0;flex:1">
            <span class="card-title-row">
              <span class="card-title">${esc(m.name)}</span>
              ${m.is_library ? `<span class="badge">library</span>` : ""}
            </span>
            <span class="card-author">by ${esc(m.author)}</span>
          </span>
          <span class="stars">${I.star}${m.stars}</span>
        </button>
        ${m.description ? `<div class="blurb">${esc(m.description)}</div>` : ""}
        ${m.labels.length ? `<div class="tags">${m.labels.slice(0, 6).map((l) => `<button class="tag" data-tag="${esc(l)}">${I.tag}${esc(l)}</button>`).join("")}</div>` : ""}
        <div class="card-foot">
          <button class="link" data-open="${esc(m.repo)}">Details</button>
          <button class="link muted" data-github="${esc(m.repo_url)}">GitHub ${I.ext}</button>
        </div>
      </div>`;
  }

  function bindCards() {
    document.querySelectorAll("img[data-fallback]").forEach((img) =>
      img.addEventListener("error", () => (img.src = initialsAvatar(img.getAttribute("data-fallback")))),
    );
    document.querySelectorAll("[data-open]").forEach((el) =>
      el.addEventListener("click", () => openProduct(el.getAttribute("data-open"))),
    );
    document.querySelectorAll("[data-tag]").forEach((el) =>
      el.addEventListener("click", (e) => { e.stopPropagation(); state.activeTag = el.getAttribute("data-tag"); renderList(); }),
    );
    document.querySelectorAll("[data-github]").forEach((el) =>
      el.addEventListener("click", (e) => { e.stopPropagation(); post({ type: "openExternal", url: el.getAttribute("data-github") }); }),
    );
  }

  // ── Product ──
  function openProduct(repo) {
    state.view = "product";
    state.repo = repo;
    state.product = null;
    state.productBusy = true;
    state.productError = null;
    save();
    post({ type: "openProduct", repo });
    renderProduct();
  }

  function renderProduct() {
    if (state.productBusy) {
      app.innerHTML = productShell(`<div class="empty"><span class="spin">${I.refresh}</span> Loading ${esc(state.repo || "")}…</div>`);
      wireBack();
      return;
    }
    if (state.productError) {
      app.innerHTML = productShell(`<div class="empty"><p class="market-error" style="border:none;background:none">${I.warn} ${esc(state.productError)}</p><button class="btn secondary" id="retry">Try again</button></div>`);
      wireBack();
      const r = document.getElementById("retry");
      if (r) r.addEventListener("click", () => openProduct(state.repo));
      return;
    }
    const p = state.product;
    if (!p) { state.view = "list"; return renderList(); }

    let action = "";
    if (p.is_library) {
      action = `<div class="installed-row">${I.lib} Library</div>
        <button class="btn block" id="adddep" style="margin-top:10px">Add as dependency</button>
        <p class="note">A dependency-only library — added to a project's CargoLua.toml, not installed into DCS.</p>`;
    } else if (!p.installable) {
      action = `<p class="note warn">${I.warn} Not installable — the latest release ships no <span class="mono">dcs-studio.toml</span>${p.release_tag ? "" : " (no release yet)"}.</p>`;
    } else {
      action = `<button class="btn block" id="install">${I.download} Install</button>
        <p class="note">The release ships a <span class="mono">dcs-studio.toml</span>. Install resolves its plan and links files into your DCS folders — plan preview is the next step.</p>`;
    }

    app.innerHTML = `
      <header>
        <button class="icon-btn" id="back" title="Back to Marketplace">${I.back}</button>
        <span class="brand-kicker">Marketplace</span>
        <span class="spacer"></span>
      </header>
      <div class="product">
        <main>
          <div style="display:flex;gap:12px;align-items:flex-start">
            <img class="avatar lg" src="${esc(p.avatar_url)}" alt="" data-fallback="${esc(p.name)}" />
            <div style="min-width:0">
              <h1>${esc(p.name)}</h1>
              <div class="product-meta">
                <span>by ${esc(p.author)}</span>
                <span>${I.star}${p.stars}</span>
                ${p.release_tag ? `<span>${esc(p.release_tag)}</span>` : ""}
              </div>
            </div>
          </div>
          ${p.description ? `<p class="product-desc">${esc(p.description)}</p>` : ""}
          <div class="section-label">${I.book} Readme</div>
          <div class="prose">${p.readme ? md(p.readme) : "<p class='note'>This repo has no README.</p>"}</div>
        </main>
        <aside>
          <div class="aside-card">${action}</div>
          <div class="aside-card">
            <div class="section-label">${I.hd} Download</div>
            <div>${fmtBytes(p.download_size)}</div>
            ${p.assets.length
              ? `<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">${p.assets.map((a) => `<div class="kv"><span class="name">${I.box} ${esc(a.name)}</span><span class="mono" style="color:var(--muted)">${fmtBytes(a.size)}</span></div>`).join("")}</div>`
              : `<p class="note">No release assets.</p>`}
          </div>
          <button class="btn secondary block" id="viewgh" style="margin-top:14px">View on GitHub ${I.ext}</button>
        </aside>
      </div>`;

    document.querySelectorAll("img[data-fallback]").forEach((img) =>
      img.addEventListener("error", () => (img.src = initialsAvatar(img.getAttribute("data-fallback")))),
    );
    wireBack();
    document.getElementById("viewgh").addEventListener("click", () => post({ type: "openExternal", url: p.repo_url }));
    const inst = document.getElementById("install");
    if (inst) inst.addEventListener("click", () => post({ type: "install", name: p.name }));
    const dep = document.getElementById("adddep");
    if (dep) dep.addEventListener("click", () => post({ type: "install", name: p.name }));
  }

  function productShell(inner) {
    return `<header><button class="icon-btn" id="back" title="Back to Marketplace">${I.back}</button><span class="brand-kicker">Marketplace</span></header>${inner}`;
  }
  function wireBack() {
    const b = document.getElementById("back");
    if (b) b.addEventListener("click", () => { state.view = "list"; state.repo = null; save(); renderList(); });
  }

  // ── Host messages ──
  window.addEventListener("message", (e) => {
    const m = e.data;
    switch (m.type) {
      case "auth":
        state.authKnown = true;
        state.signedIn = m.signedIn;
        state.browsing = m.browsing;
        state.login = m.login || null;
        state.topic = m.topic || state.topic;
        if (state.view === "list") renderList();
        break;
      case "listings:busy":
        state.listBusy = true;
        state.listError = null;
        if (state.view === "list") renderList();
        break;
      case "listings":
        state.listBusy = false;
        state.listings = m.listings || [];
        state.listError = null;
        if (state.view === "list") renderList();
        break;
      case "listings:error":
        state.listBusy = false;
        state.listError = m.message;
        if (state.view === "list") renderList();
        break;
      case "product:busy":
        if (state.repo === m.repo) { state.productBusy = true; state.productError = null; if (state.view === "product") renderProduct(); }
        break;
      case "product":
        state.productBusy = false;
        state.product = m.product;
        state.repo = m.product.repo;
        if (state.view === "product") renderProduct();
        break;
      case "product:error":
        if (state.repo === m.repo) { state.productBusy = false; state.productError = m.message; if (state.view === "product") renderProduct(); }
        break;
    }
  });

  // ── Boot ──
  render();
  post({ type: "ready" });
  if (state.view === "product" && state.repo) openProduct(state.repo);
})();
</script>
